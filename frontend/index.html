<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Recommender</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <div id="auth-bar">
      <span id="auth-status"></span>
      <button type="button" id="auth-login-btn" class="auth-btn hidden">Log in</button>
      <button type="button" id="auth-logout-btn" class="auth-btn hidden">Log out</button>
    </div>
    <h1>Book Recommender</h1>
    <p class="subtitle">Search by title, author, or genre to discover books</p>
  </header>

  <main>
    <form id="search-form">
      <div class="category-tabs">
        <button type="button" class="tab active" data-category="title">Title</button>
        <button type="button" class="tab" data-category="author">Author</button>
        <button type="button" class="tab" data-category="genre">Genre</button>
        <button type="button" class="tab library-tab" data-category="library">My Library</button>
      </div>
      <div class="search-bar">
        <input
          type="text"
          id="search-input"
          placeholder="Search by title..."
          autocomplete="off"
        />
        <button type="submit" id="search-btn">Search</button>
      </div>
    </form>

    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <p>Searching and ranking books...</p>
    </div>

    <div id="error" class="hidden"></div>

    <section id="results" class="hidden">
      <h2 id="results-heading"></h2>
      <div id="results-container"></div>
    </section>

    <div id="pagination" class="hidden"></div>
  </main>

  <div id="auth-modal" class="hidden">
    <div class="auth-card">
      <button type="button" id="auth-close" class="auth-close" aria-label="Close">&times;</button>
      <h2 id="auth-title">Log in</h2>
      <form id="auth-form">
        <input type="text" id="auth-username" placeholder="Username" autocomplete="username" />
        <input type="password" id="auth-password" placeholder="Password" autocomplete="current-password" />
        <div id="auth-error" class="auth-error hidden"></div>
        <button type="submit" id="auth-submit">Log in</button>
      </form>
      <p class="auth-toggle">
        <span id="auth-toggle-text">Don't have an account?</span>
        <button type="button" id="auth-toggle-btn">Sign up</button>
      </p>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
